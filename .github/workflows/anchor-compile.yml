# 锚点编译矩阵 + 非法分界扫描（见 docs/version-segments.md）
name: Anchor Compile Matrix

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

jobs:
  scan-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan version boundaries
        run: bash scripts/scan-version-boundaries.sh

  # 完整 9 锚点矩阵耗时长；CI 默认跑关键闸门三锚点，workflow_dispatch 可扩
  compile-critical-anchors:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc_ver: '1.20.1'
            tasks: ':fabric:compileJava :forge:compileJava :neoforge:compileJava'
          - mc_ver: '1.20.5'
            tasks: ':fabric:compileJava :neoforge:compileJava'
          - mc_ver: '1.21.11'
            tasks: ':fabric:compileJava :forge:compileJava :neoforge:compileJava'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.mc_ver == '1.20.1' && '17' || '21' }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compile ${{ matrix.mc_ver }}
        run: ./gradlew --no-daemon ${{ matrix.tasks }} -Pmc_ver=${{ matrix.mc_ver }}
