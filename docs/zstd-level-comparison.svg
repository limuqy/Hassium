<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" role="img" aria-label="ZSTD 压缩级别带宽对比">
<title>ZSTD compression level bandwidth comparison · 1.20.1 Fabric · ROUND1 VD=20</title>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fafafa"/>
    <stop offset="100%" stop-color="#f0f0f0"/>
  </linearGradient>
</defs>
<rect width="720" height="460" fill="url(#bg)" rx="4"/>

<text x="360" y="28" text-anchor="middle" font-family="Verdana,Geneva,sans-serif" font-size="14" font-weight="bold" fill="#333">
  Hassium ZSTD 压缩级别对比 · 1.20.1 Fabric
</text>
<text x="360" y="46" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#888">
  ROUND1 VD=20 初始连接（无缓存）· 客户端接收字节 · Zlib 基线：Deflater(6)+阈值256 帧格式估算
</text>

<!-- Y-axis: 0..16 MB -->
<line x1="80" y1="360" x2="80" y2="100" stroke="#999" stroke-width="1"/>
<text x="16" y="235" text-anchor="middle" font-family="Verdana,sans-serif" font-size="11" fill="#777" transform="rotate(-90, 16, 235)">接收字节 (MB)</text>

<line x1="80" y1="360.0" x2="680" y2="360.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="364.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#999">0</text>
<line x1="80" y1="327.5" x2="680" y2="327.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="331.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">2</text>
<line x1="80" y1="295.0" x2="680" y2="295.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="299.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">4</text>
<line x1="80" y1="262.5" x2="680" y2="262.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="266.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">6</text>
<line x1="80" y1="230.0" x2="680" y2="230.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="234.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">8</text>
<line x1="80" y1="197.5" x2="680" y2="197.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="201.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">10</text>
<line x1="80" y1="165.0" x2="680" y2="165.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="169.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">12</text>
<line x1="80" y1="132.5" x2="680" y2="132.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="136.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">14</text>
<line x1="80" y1="100.0" x2="680" y2="100.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="104.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">16</text>
<line x1="80" y1="360.0" x2="680" y2="360.0" stroke="#666" stroke-width="1"/>

<!-- Scale: 1MB = 260/16 = 16.25px -->

<!-- Zlib baseline -->
<rect x="120" y="160.1" width="48" height="199.9" fill="#E57373" rx="2"/>
<text x="144" y="154.1" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#888">12.3 MB</text>

<!-- ZSTD-3 (Hassium default) -->
<rect x="230" y="245.8" width="48" height="114.2" fill="#FFB74D" rx="2"/>
<text x="254" y="239.8" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#E65100" font-weight="bold">7.0 MB</text>
<text x="344" y="360" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#E65100" font-weight="bold">↓43%</text>

<!-- ZSTD-6 -->
<rect x="340" y="252.3" width="48" height="107.7" fill="#4CAF50" rx="2"/>
<text x="364" y="246.3" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">6.6 MB</text>
<text x="460" y="360" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">↓48%</text>

<!-- ZSTD-9 (timeout) -->
<rect x="450" y="100" width="48" height="260" fill="#BDBDBD" rx="2"/>
<text x="474" y="94" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#888">超时</text>
<text x="570" y="360" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#999">—</text>

<!-- Column labels -->
<text x="144" y="378.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">原版 Zlib</text>
<text x="254" y="378.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">ZSTD-3</text>
<text x="364" y="378.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">ZSTD-6</text>
<text x="474" y="378.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">ZSTD-9</text>
<text x="144" y="392.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">level 6</text>
<text x="254" y="392.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">Hassium 默认</text>
<text x="364" y="392.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">中等压缩</text>
<text x="474" y="392.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">客户端超时</text>

<!-- Compression ratio row -->
<text x="144" y="340.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">—</text>
<text x="254" y="340.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">1.76:1</text>
<text x="364" y="340.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">1.92:1</text>
<text x="474" y="340.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">—</text>

<!-- Legend -->
<rect x="100" y="410" width="12" height="12" fill="#E57373" rx="1"/>
<text x="116" y="421" font-family="Verdana,sans-serif" font-size="9" fill="#666">Zlib（Deflater 6 + 帧头 估算）</text>
<rect x="300" y="410" width="12" height="12" fill="#FFB74D" rx="1"/>
<text x="316" y="421" font-family="Verdana,sans-serif" font-size="9" fill="#666">ZSTD-3（默认）</text>
<rect x="430" y="410" width="12" height="12" fill="#4CAF50" rx="1"/>
<text x="446" y="421" font-family="Verdana,sans-serif" font-size="9" fill="#666">ZSTD-6</text>
<text x="600" y="421" font-family="Verdana,sans-serif" font-size="9" fill="#888">ZSTD-9: 压缩太慢，100s 内未完成初始区块推送</text>
</svg>