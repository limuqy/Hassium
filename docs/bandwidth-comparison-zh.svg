<svg xmlns="http://www.w3.org/2000/svg" width="840" height="480" role="img" aria-label="Hassium 带宽对比 Zlib 基线">
<title>Hassium ZSTD vs 原版 Zlib · ROUND1 VD=20（无缓存）· 客户端接收字节</title>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fafafa"/>
    <stop offset="100%" stop-color="#f0f0f0"/>
  </linearGradient>
</defs>
<rect width="840" height="480" fill="url(#bg)" rx="4"/>

<!-- Title + subtitle -->
<text x="420" y="28" text-anchor="middle" font-family="Verdana,Geneva,sans-serif" font-size="14" font-weight="bold" fill="#333">
  Hassium 带宽对比 · ZSTD vs 原版 Zlib
</text>
<text x="420" y="46" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#888">
  ROUND1 VD=20 初始连接（无缓存命中）· 客户端接收字节 · 诚实值（Zlib 估算基于 Deflater(6)+阈值256 帧格式）
</text>

<!-- Y-axis: 0..16 MB -->
<line x1="80" y1="90" x2="80" y2="350" stroke="#999" stroke-width="1"/>
<text x="16" y="225" text-anchor="middle" font-family="Verdana,sans-serif" font-size="11" fill="#777" transform="rotate(-90, 16, 225)">接收字节数 (MB)</text>

<!-- Grid lines + labels -->
<line x1="80" y1="350.0" x2="824" y2="350.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="354.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#999">0</text>
<line x1="80" y1="317.5" x2="824" y2="317.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="321.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">2</text>
<line x1="80" y1="285.0" x2="824" y2="285.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="289.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">4</text>
<line x1="80" y1="252.5" x2="824" y2="252.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="256.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">6</text>
<line x1="80" y1="220.0" x2="824" y2="220.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="224.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">8</text>
<line x1="80" y1="187.5" x2="824" y2="187.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="191.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">10</text>
<line x1="80" y1="155.0" x2="824" y2="155.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="159.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">12</text>
<line x1="80" y1="122.5" x2="824" y2="122.5" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="126.5" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">14</text>
<line x1="80" y1="90.0" x2="824" y2="90.0" stroke="#e0e0e0" stroke-width="0.5"/>
<text x="72" y="94.0" text-anchor="end" font-family="Verdana,sans-serif" font-size="9" fill="#bbb">16</text>

<!-- Baseline line at y=350 -->
<line x1="80" y1="350.0" x2="824" y2="350.0" stroke="#666" stroke-width="1"/>

<!-- ===== Data columns ===== -->
<!-- Column spacing: 1.20.1 Fabric at x=140, 1.20.1 NeoForge at x=290, 1.21.1 Fabric at x=440, 1.21.11 Fabric at x=590 -->
<!-- Bar width = 44px, gap between Zlib/ZSTD in same group = 6px -->

<!-- Group 1: 1.20.1 Fabric -->
<!-- vanilla=12.3 MB → y=350-12.3*16.25=350-200=150 -->
<!-- actual=7.0 MB → y=350-7*16.25=350-114=236 -->
<rect x="118" y="150.0" width="44" height="200.0" fill="#E57373" rx="2"/>
<text x="140" y="144.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#888">12.3</text>
<rect x="166" y="236.0" width="44" height="114.0" fill="#4CAF50" rx="2"/>
<text x="188" y="230.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">7.0</text>
<text x="166" y="218.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">↓43%</text>
<text x="166" y="368.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">1.20.1</text>
<text x="166" y="382.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">Fabric</text>

<!-- Group 2: 1.20.1 NeoForge -->
<!-- vanilla=14.5 MB → 350-14.5*16.25=350-236=114 -->
<!-- actual=9.2 MB → 350-9.2*16.25=350-150=200 -->
<rect x="268" y="114.0" width="44" height="236.0" fill="#E57373" rx="2"/>
<text x="290" y="108.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#888">14.5</text>
<rect x="316" y="200.0" width="44" height="150.0" fill="#4CAF50" rx="2"/>
<text x="338" y="194.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">9.2</text>
<text x="316" y="182.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">↓36%</text>
<text x="316" y="368.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">1.20.1</text>
<text x="316" y="382.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">NeoForge</text>

<!-- Group 3: 1.21.1 Fabric -->
<!-- vanilla=7.3 MB → 350-7.3*16.25=350-119=231 -->
<!-- actual=5.7 MB → 350-5.7*16.25=350-93=257 -->
<rect x="418" y="231.0" width="44" height="119.0" fill="#E57373" rx="2"/>
<text x="440" y="225.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#888">7.3</text>
<rect x="466" y="257.0" width="44" height="93.0" fill="#4CAF50" rx="2"/>
<text x="488" y="251.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">5.7</text>
<text x="466" y="239.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">↓21%</text>
<text x="466" y="368.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">1.21.1</text>
<text x="466" y="382.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">Fabric</text>

<!-- Group 4: 1.21.11 Fabric -->
<!-- vanilla=7.1 MB → 350-7.1*16.25=350-115=235 -->
<!-- actual=5.7 MB → 350-5.7*16.25=350-93=257 -->
<rect x="568" y="235.0" width="44" height="115.0" fill="#E57373" rx="2"/>
<text x="590" y="229.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#888">7.1</text>
<rect x="616" y="257.0" width="44" height="93.0" fill="#4CAF50" rx="2"/>
<text x="638" y="251.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">5.7</text>
<text x="616" y="239.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">↓20%</text>
<text x="616" y="368.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="10" fill="#333">1.21.11</text>
<text x="616" y="382.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#999">Fabric</text>

<!-- Legend -->
<rect x="120" y="402" width="14" height="14" fill="#E57373" rx="1"/>
<text x="138" y="413" font-family="Verdana,sans-serif" font-size="10" fill="#666">原版 Zlib（Deflater(6)+帧头 估算）</text>
<rect x="320" y="402" width="14" height="14" fill="#4CAF50" rx="1"/>
<text x="338" y="413" font-family="Verdana,sans-serif" font-size="10" fill="#2E7D32">Hassium ZSTD（线缆实测 + 聚合 + 管线上下文）</text>
<text x="590" y="413" font-family="Verdana,sans-serif" font-size="9" fill="#999">百分比 = (Zlib-ZSTD)/Zlib</text>

<!-- Comparison row: compression ratio per column -->
<text x="166" y="398.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">1.76:1</text>
<text x="316" y="398.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">1.57:1</text>
<text x="466" y="398.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">1.27:1</text>
<text x="616" y="398.0" text-anchor="middle" font-family="Verdana,sans-serif" font-size="8" fill="#777">1.25:1</text>
</svg>